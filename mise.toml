[tools]
trufflehog = "latest"
python = "3.14"
ruff = "latest"
uv = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.scan-secrets]
description = "Secret Scanning"
run = "trufflehog git file://. --results=verified,unknown"

[tasks.lint]
description = "Lint using Ruff"
run = "ruff check"

[tasks.check-format]
description = "Check formatting using Ruff"
run = "ruff format --check"

[tasks.format]
description = "Format using Ruff"
run = "ruff format"

[tasks.test]
description = "Run Unit tests using PyTest"
run = "uv run --frozen --group test pytest"

[tasks.build-exec]
description = "Build executable"
run = """
uv pip install pyinstaller
pyinstaller --onefile --name sml "sml/ops/cli.py"
"""

[tasks.build-package]
description = "Build package wheel"
run = "uv build"
