[tools]
trufflehog = "latest"
python = "3.14"
ruff = "latest"
uv = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.scan-secrets]
description = "Secret Scanning"
run = "trufflehog git file://. --results=verified,unknown"

[tasks.lint]
description = "Lint using Ruff"
usage = """
flag "--fix" help="Fix linting errors"
"""
run = "ruff check ${usage_fix:+--fix}"

[tasks.format]
description = "Format using Ruff"
usage = """
flag "--fix" help="Fix formatting errors"
"""
run = '[ "${usage_fix:-false}" = "true" ] && ruff format || ruff format --check'

[tasks.test]
description = "Run Unit tests using PyTest"
run = "uv run --frozen --group test pytest"

[tasks.build-exec]
description = "Build executable"
run = """
uv pip install pyinstaller
pyinstaller --onefile --name sml "sml/ops/cli.py"
"""

[tasks.build-package]
description = "Build package wheel"
run = "uv build --wheel --clear"

[tasks.publish]
description = "Build and publish package wheel to production PyPI"
depends = ["build-package"]
run = """
VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
WHEEL=$(find dist -maxdepth 1 -name "*-${VERSION}-*.whl" -print)
if [ "$(printf '%s\n' "$WHEEL" | sed '/^$/d' | wc -l)" -ne 1 ]; then
  echo "Expected exactly one wheel for version ${VERSION}, found: ${WHEEL:-none}"
  exit 1
fi
uv publish --index pypi "$WHEEL"
"""
