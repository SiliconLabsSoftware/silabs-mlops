[project]
name = "silabs-mlops-cli"
version = "0.1.0"
description = "Professional MLOps toolset for Silicon Labs edge devices and Databricks."
readme = "readme.md"
requires-python = ">=3.9"
dependencies = [
    "click",
    "requests",
    "python-dotenv",
    "pyyaml",
    "databricks-zerobus-ingest-sdk>=0.2.0",
    "grpcio>=1.48.0",
    "protobuf>4.25,<7",
    "mlflow",
    "tensorflow>=2.15.0",
    "numpy",
]

[project.scripts]
silabs-mlops = "silabs_mlops.cli:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
