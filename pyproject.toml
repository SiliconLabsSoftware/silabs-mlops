[project]
name = "sml-ops"
version = "0.1.0"
description = "Silicon Labs MLOps SDK for edge devices and Databricks."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "click",
  "requests",
  "python-dotenv",
  "pyyaml",
  "databricks-zerobus-ingest-sdk>=0.2.0",
  "grpcio>=1.48.0",
  "protobuf>4.25,<7",
  "mlflow",
  "tensorflow>=2.15.0",
  "numpy",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov",
]

[project.scripts]
sml = "sml.ops.cli:cli"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
exclude = ["tests*", "tests"]

[tool.uv]
managed = true

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=7.1.0",
]

[tool.pytest.ini_options]
addopts = "--cov=sml.ops.model --cov-report=term-missing"
testpaths = ["tests"]
