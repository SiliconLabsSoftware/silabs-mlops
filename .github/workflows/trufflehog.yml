name: TruffleHog Security Scan
on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
permissions:
  contents: read

jobs:
  trufflehog_scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - uses: jdx/mise-action@v4

      - name: Secret Scanning
        run: mise run scan-secrets
